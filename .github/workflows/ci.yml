name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Control Plane
        run: npm run validate:control-plane

      - name: Validate Drift
        run: npm run validate:drift

      - name: Validate Slice Traceability
        run: npm run validate:slice-traceability

      - name: Validate Surface Traceability
        run: npm run validate:surface-traceability

      - name: Validate Semantic Guardrails
        run: npm run validate:semantic-guardrails

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
